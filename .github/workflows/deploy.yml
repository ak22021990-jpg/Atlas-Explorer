name: Build and Deploy

on:
  push:
    branches: [ "main" ] # Runs whenever you push to the main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
      

    - name: Install dependencies
      run: npm install

    - name: Build project
      run: npm run build --if-present

    #- name: Build project
      run: npm run build --if-present

    - name: Upload production-ready site
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./dist # Change this to 'build' or '.' if your files are in a different folder
        
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 Add your specific deployment step here (e.g., GitHub Pages, Firebase, AWS, etc.)
    # Example for GitHub Pages:
    # - name: Deploy to GitHub Pages
    #   uses: peaceiris/actions-gh-pages@v3
    #   with:
    #     github_token: ${{ secrets.GITHUB_TOKEN }}
    #     publish_dir: ./dist
