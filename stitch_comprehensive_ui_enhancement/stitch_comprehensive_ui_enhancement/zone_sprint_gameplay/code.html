<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Atlas Explorer - Zone Sprint</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#c48a3b",
                        "primary-fixed": "#d7e3f7",
                        "tertiary": "#271500",
                        "surface-tint": "#535f70",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#432800",
                        "on-primary-container": "#8a97a9",
                        "inverse-surface": "#303031",
                        "surface-bright": "#fbf9fa",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#ffdcbd",
                        "on-surface": "#1b1b1d",
                        "surface-container-highest": "#e4e2e3",
                        "surface-dim": "#dcd9db",
                        "on-background": "#1b1b1d",
                        "on-primary-fixed-variant": "#3c4858",
                        "inverse-primary": "#bbc7db",
                        "primary-container": "#232f3e",
                        "on-secondary": "#ffffff",
                        "background": "#fbf9fa",
                        "on-primary-fixed": "#101c2b",
                        "surface-container-low": "#f5f3f4",
                        "surface-container": "#f0edee",
                        "secondary-container": "#fe9800",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#693c00",
                        "surface": "#fbf9fa",
                        "tertiary-fixed": "#ffddb7",
                        "outline-variant": "#c5c6cc",
                        "on-surface-variant": "#44474c",
                        "on-secondary-fixed": "#2c1600",
                        "on-tertiary-fixed-variant": "#653e00",
                        "secondary-fixed-dim": "#ffb86f",
                        "on-secondary-container": "#643900",
                        "error": "#ba1a1a",
                        "surface-container-high": "#eae7e9",
                        "tertiary-fixed-dim": "#fbba67",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f3f0f1",
                        "primary-fixed-dim": "#bbc7db",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#e4e2e3",
                        "outline": "#75777c",
                        "on-tertiary-fixed": "#2a1700",
                        "primary": "#0e1a28",
                        "secondary": "#8a5100"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin": "48px",
                        "container-max": "1440px",
                        "gutter": "24px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "h2-headline": ["Inter"],
                        "h3-subheading": ["Inter"],
                        "body-lg": ["Inter"],
                        "h1-display": ["Inter"],
                        "label-numeric": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700" }],
                        "h2-headline": ["32px", { "lineHeight": "1.2", "fontWeight": "800" }],
                        "h3-subheading": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h1-display": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "label-numeric": ["14px", { "lineHeight": "1", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Base styles and structural modernism utilities */
        body {
            background-color: #0e1a28; /* Enforcing dark primary for the gameplay canvas */
            color: #ffffff;
            overflow: hidden; /* Prevent scrolling during focused gameplay */
        }
        
        /* Subtle topographic/chevron grid overlay */
        .bg-topographic {
            background-image: 
                linear-gradient(45deg, rgba(83, 95, 112, 0.05) 25%, transparent 25%, transparent 50%, rgba(83, 95, 112, 0.05) 50%, rgba(83, 95, 112, 0.05) 75%, transparent 75%, transparent);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
        }

        /* Compass HUD crosshairs */
        .hud-crosshair::before, .hud-crosshair::after {
            content: '';
            position: absolute;
            background-color: rgba(83, 95, 112, 0.2); /* surface-tint low opacity */
            z-index: 0;
        }
        .hud-crosshair::before {
            top: 50%; left: 0; right: 0; height: 1px;
            transform: translateY(-50%);
        }
        .hud-crosshair::after {
            left: 50%; top: 0; bottom: 0; width: 1px;
            transform: translateX(-50%);
        }

        /* Radial ring layout math approximations for tailwind classes */
        .ring-node {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ring-node:hover {
            transform: scale(1.05) translateY(-2px);
        }
    </style>
</head>
<body class="font-body-md text-body-md h-screen w-screen flex flex-col relative">
<!-- Ambient Background Texture -->
<div class="absolute inset-0 z-0 bg-topographic opacity-50 pointer-events-none" data-alt="subtle pale slate chevron ridge pattern over dark blue background indicating a modern topographic map aesthetic"></div>
<!-- 
        TOP APP BAR (JSON DRIVEN) 
        Conflict Resolution: Using exact classes from style_* keys. 
    -->
<header class="fixed docked full-width top-0 border-b border-white/10 shadow-sm flex justify-between items-center px-6 py-3 w-full bg-slate-900 dark:bg-black z-50">
<!-- Brand / Identity -->
<div class="flex items-center gap-4">
<h1 class="text-lg font-black tracking-widest text-white uppercase font-semibold font-inter tracking-tight">
                Atlas Explorer
            </h1>
</div>
<!-- Trailing Actions & Primary Stats -->
<div class="flex items-center gap-6">
<span class="text-amber-500 dark:text-amber-400 font-label-numeric text-label-numeric">
                Stats: 1,250
            </span>
<div class="flex items-center gap-3">
<button aria-label="Account" class="text-slate-400 hover:text-amber-300 transition-colors scale-95 active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
<button aria-label="Military Tech" class="text-slate-400 hover:text-amber-300 transition-colors scale-95 active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="military_tech">military_tech</span>
</button>
</div>
</div>
</header>
<!-- 
        GAMEPLAY CANVAS 
        Focused task environment. Bottom navigation is suppressed intentionally.
    -->
<main class="flex-1 w-full flex flex-col relative z-10 pt-[60px]">
<!-- Timer Bar HUD -->
<div class="w-full h-2 bg-primary-container relative">
<!-- Simulated ticking down timer -->
<div class="absolute top-0 left-0 h-full bg-surface-tint w-[65%] rounded-r-full shadow-[0_0_8px_rgba(83,95,112,0.5)]"></div>
</div>
<!-- Sprint Title & Meta -->
<div class="w-full text-center py-6">
<h2 class="font-label-caps text-label-caps text-surface-tint uppercase tracking-widest">
                Zone Sprint
            </h2>
<p class="font-body-md text-body-md text-outline mt-1">Classify the region. Time is ticking.</p>
</div>
<!-- Central Gameplay Ring Interface -->
<div class="flex-1 flex items-center justify-center w-full px-gutter pb-margin">
<div class="relative w-full max-w-[500px] aspect-square hud-crosshair">
<!-- Central Target Prompt -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20 flex flex-col items-center justify-center bg-primary border border-surface-tint/30 rounded-full w-[220px] h-[220px] shadow-[0_4px_24px_rgba(0,0,0,0.4)] backdrop-blur-sm">
<span class="material-symbols-outlined text-surface-tint mb-2 opacity-70" style="font-variation-settings: 'FILL' 1;">location_on</span>
<h2 class="font-h2-headline text-h2-headline text-on-primary text-center leading-none">
                        Denver,<br/>CO
                    </h2>
</div>
<!-- 
                    Options Ring 
                    Using fixed compass points for the HUD aesthetic
                -->
<!-- Option: Mountain (Correct State Simulation) -->
<button class="ring-node absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 z-30 flex flex-col items-center justify-center w-[100px] h-[100px] rounded-full bg-secondary-container text-on-secondary-container border-2 border-secondary shadow-[0_0_20px_rgba(254,152,0,0.3)]">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">landscape</span>
<span class="font-label-caps text-label-caps uppercase">Mountain</span>
<!-- Feedback indicator -->
<span class="absolute -top-2 -right-2 bg-on-primary text-secondary-container rounded-full w-6 h-6 flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-[16px]">check</span>
</span>
</button>
<!-- Option: Plain -->
<button class="ring-node absolute right-0 top-1/2 translate-x-1/2 -translate-y-1/2 z-30 flex flex-col items-center justify-center w-[100px] h-[100px] rounded-full bg-primary-container text-on-primary border border-outline/20 hover:border-surface-tint hover:bg-surface-tint/20 text-on-primary-container hover:text-on-primary">
<span class="material-symbols-outlined mb-1">grass</span>
<span class="font-label-caps text-label-caps uppercase">Plain</span>
</button>
<!-- Option: Coast -->
<button class="ring-node absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 z-30 flex flex-col items-center justify-center w-[100px] h-[100px] rounded-full bg-primary-container text-on-primary border border-outline/20 hover:border-surface-tint hover:bg-surface-tint/20 text-on-primary-container hover:text-on-primary">
<span class="material-symbols-outlined mb-1">water</span>
<span class="font-label-caps text-label-caps uppercase">Coast</span>
</button>
<!-- Option: Plateau -->
<button class="ring-node absolute left-0 top-1/2 -translate-x-1/2 -translate-y-1/2 z-30 flex flex-col items-center justify-center w-[100px] h-[100px] rounded-full bg-primary-container text-on-primary border border-outline/20 hover:border-surface-tint hover:bg-surface-tint/20 text-on-primary-container hover:text-on-primary">
<span class="material-symbols-outlined mb-1">terrain</span>
<span class="font-label-caps text-label-caps uppercase">Plateau</span>
</button>
</div>
</div>
<!-- Streak / Status Area -->
<div class="w-full flex justify-between items-end px-margin pb-margin pointer-events-none">
<div class="flex items-center gap-2 bg-primary-container/80 backdrop-blur border border-surface-tint/20 rounded-full px-4 py-2">
<span class="material-symbols-outlined text-secondary-container" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="font-label-numeric text-label-numeric text-on-primary">Streak: 12</span>
</div>
<div class="flex items-center gap-2 bg-primary-container/80 backdrop-blur border border-surface-tint/20 rounded-full px-4 py-2 text-surface-tint">
<span class="material-symbols-outlined text-[18px]">keyboard_double_arrow_right</span>
<span class="font-label-caps text-label-caps uppercase">Next: Auto</span>
</div>
</div>
</main>
</body></html>
