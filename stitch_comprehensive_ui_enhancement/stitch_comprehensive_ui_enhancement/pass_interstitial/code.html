<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Atlas Explorer - Level Cleared</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#c48a3b",
                        "primary-fixed": "#d7e3f7",
                        "tertiary": "#271500",
                        "surface-tint": "#535f70",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#432800",
                        "on-primary-container": "#8a97a9",
                        "inverse-surface": "#303031",
                        "surface-bright": "#fbf9fa",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#ffdcbd",
                        "on-surface": "#1b1b1d",
                        "surface-container-highest": "#e4e2e3",
                        "surface-dim": "#dcd9db",
                        "on-background": "#1b1b1d",
                        "on-primary-fixed-variant": "#3c4858",
                        "inverse-primary": "#bbc7db",
                        "primary-container": "#232f3e",
                        "on-secondary": "#ffffff",
                        "background": "#fbf9fa",
                        "on-primary-fixed": "#101c2b",
                        "surface-container-low": "#f5f3f4",
                        "surface-container": "#f0edee",
                        "secondary-container": "#fe9800",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#693c00",
                        "surface": "#fbf9fa",
                        "tertiary-fixed": "#ffddb7",
                        "outline-variant": "#c5c6cc",
                        "on-surface-variant": "#44474c",
                        "on-secondary-fixed": "#2c1600",
                        "on-tertiary-fixed-variant": "#653e00",
                        "secondary-fixed-dim": "#ffb86f",
                        "on-secondary-container": "#643900",
                        "error": "#ba1a1a",
                        "surface-container-high": "#eae7e9",
                        "tertiary-fixed-dim": "#fbba67",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f3f0f1",
                        "primary-fixed-dim": "#bbc7db",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#e4e2e3",
                        "outline": "#75777c",
                        "on-tertiary-fixed": "#2a1700",
                        "primary": "#0e1a28",
                        "secondary": "#8a5100"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin": "48px",
                        "container-max": "1440px",
                        "gutter": "24px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "h2-headline": ["Inter"],
                        "h3-subheading": ["Inter"],
                        "body-lg": ["Inter"],
                        "h1-display": ["Inter"],
                        "label-numeric": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700" }],
                        "h2-headline": ["32px", { "lineHeight": "1.2", "fontWeight": "800" }],
                        "h3-subheading": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h1-display": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "label-numeric": ["14px", { "lineHeight": "1", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #0e1a28; /* primary */
            background-image: radial-gradient(circle at 50% 0%, #232f3e 0%, transparent 70%);
        }
        .topographic-bg {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M10 10c20 5 40 15 60 5" stroke="rgba(255,255,255,0.03)" fill="none"/></svg>');
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-gutter topographic-bg text-on-primary">
<main class="w-full max-w-md bg-inverse-surface rounded-xl shadow-2xl relative overflow-hidden border-t-4 border-secondary-container">
<!-- Subtle Topographic watermark -->
<div class="absolute -bottom-20 -right-20 opacity-10 pointer-events-none">
<span class="material-symbols-outlined text-[200px]" style="font-variation-settings: 'FILL' 0;">public</span>
</div>
<div class="p-8 flex flex-col items-center text-center relative z-10">
<h1 class="font-h2-headline text-h2-headline text-on-primary mb-2">LEVEL CLEARED</h1>
<p class="font-label-caps text-label-caps text-on-primary-container mb-8">SECTOR 7: THE RIFT</p>
<!-- Stars -->
<div class="flex gap-2 mb-8">
<span class="material-symbols-outlined text-4xl text-secondary-container drop-shadow-md" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-5xl text-secondary-container drop-shadow-md -mt-4" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-4xl text-secondary-container drop-shadow-md" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<!-- Score -->
<div class="bg-primary-container border border-outline-variant/20 rounded-lg w-full py-6 mb-8 shadow-sm">
<p class="font-label-caps text-label-caps text-on-primary-container mb-1">FINAL SCORE</p>
<p class="font-h1-display text-h1-display text-on-primary tracking-tight">12,450</p>
</div>
<!-- Badge Unlocked -->
<div class="flex items-center gap-4 bg-primary/50 border border-outline-variant/10 rounded-lg w-full p-4 mb-10">
<div class="bg-surface-tint rounded-full p-3 flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary" style="font-variation-settings: 'FILL' 1;">explore</span>
</div>
<div class="text-left flex-1">
<p class="font-label-caps text-label-caps text-secondary-container mb-1">BADGE UNLOCKED</p>
<p class="font-h3-subheading text-h3-subheading text-on-primary">Cartographer</p>
</div>
</div>
<!-- Action -->
<button class="w-full bg-[#FF9900] text-[#271500] font-label-caps text-label-caps py-4 rounded-DEFAULT shadow-md hover:-translate-y-0.5 active:translate-y-0 transition-transform">
                Next Level
            </button>
<button class="mt-4 text-on-primary-container hover:text-on-primary transition-colors font-label-caps text-label-caps underline decoration-outline-variant underline-offset-4">
                Return to Base
            </button>
</div>
</main>
</body></html>
