<div class="absolute top-0 right-0 p-4 border-b border-l border-outline/20 bg-primary/40 rounded-bl-lg">

</div>
<div class="p-8 md:p-12 flex flex-col items-center text-center mt-6">
<div class="w-16 h-16 rounded-full bg-surface-tint/10 border border-outline/30 flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-4xl text-outline-variant" data-icon="warning">warning</span>
</div>

<p class="font-body-lg text-body-lg text-on-primary-container mb-10 max-w-[280px]">

                </p>
<div class="flex items-center justify-center gap-4 mb-10 w-full">
<div class="flex items-center gap-2">
<span class="font-label-caps text-label-caps text-outline-variant mr-2">ATTEMPTS</span>

</div>
</div>

<span class="material-symbols-outlined icon-fill text-[18px]" data-icon="refresh">refresh</span>

                    </button>
