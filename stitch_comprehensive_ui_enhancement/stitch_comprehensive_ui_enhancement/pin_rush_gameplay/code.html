<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Atlas Explorer - Pin Rush Gameplay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#c48a3b",
                        "primary-fixed": "#d7e3f7",
                        "tertiary": "#271500",
                        "surface-tint": "#535f70",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#432800",
                        "on-primary-container": "#8a97a9",
                        "inverse-surface": "#303031",
                        "surface-bright": "#fbf9fa",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#ffdcbd",
                        "on-surface": "#1b1b1d",
                        "surface-container-highest": "#e4e2e3",
                        "surface-dim": "#dcd9db",
                        "on-background": "#1b1b1d",
                        "on-primary-fixed-variant": "#3c4858",
                        "inverse-primary": "#bbc7db",
                        "primary-container": "#232f3e",
                        "on-secondary": "#ffffff",
                        "background": "#fbf9fa",
                        "on-primary-fixed": "#101c2b",
                        "surface-container-low": "#f5f3f4",
                        "surface-container": "#f0edee",
                        "secondary-container": "#fe9800",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#693c00",
                        "surface": "#fbf9fa",
                        "tertiary-fixed": "#ffddb7",
                        "outline-variant": "#c5c6cc",
                        "on-surface-variant": "#44474c",
                        "on-secondary-fixed": "#2c1600",
                        "on-tertiary-fixed-variant": "#653e00",
                        "secondary-fixed-dim": "#ffb86f",
                        "on-secondary-container": "#643900",
                        "error": "#ba1a1a",
                        "surface-container-high": "#eae7e9",
                        "tertiary-fixed-dim": "#fbba67",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f3f0f1",
                        "primary-fixed-dim": "#bbc7db",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#e4e2e3",
                        "outline": "#75777c",
                        "on-tertiary-fixed": "#2a1700",
                        "primary": "#0e1a28",
                        "secondary": "#8a5100"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin": "48px",
                        "container-max": "1440px",
                        "gutter": "24px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "h2-headline": ["Inter"],
                        "h3-subheading": ["Inter"],
                        "body-lg": ["Inter"],
                        "h1-display": ["Inter"],
                        "label-numeric": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700" }],
                        "h2-headline": ["32px", { "lineHeight": "1.2", "fontWeight": "800" }],
                        "h3-subheading": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h1-display": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "label-numeric": ["14px", { "lineHeight": "1", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }]
                    }
                }
            }
        };
    </script>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        /* Sand/Dot Grid Motif */
        .bg-dot-grid {
            background-image: radial-gradient(rgba(254, 152, 0, 0.15) 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-primary text-on-primary min-h-screen flex flex-col font-body-md text-body-md overflow-hidden relative selection:bg-secondary-container selection:text-on-primary">
<!-- Ambient Topographic Background -->
<div class="absolute inset-0 opacity-5 pointer-events-none mix-blend-overlay z-0" data-alt="subtle grey topographic map contour lines pattern overlay" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCt-eQo94FlxkxVyyFwAKJZFMQwexpoHXZFAOz06jaWNc7cRZ9G8KBs8dqYxg2nfh3UBDEdJ2WmYl5JfUnn2eQmn0vE328iLukl4cMu934WyuQbSAA2drUaR9sbrCoKxje7YEbpTqokmB1PHs8T1O30MZ5ElXEN1y0CGUfCiuOfb2JPaTytFHC4N48owyZewkzMoOthq42avtOL4IumLE1H6BubB0knhREwRP9nToMWhnIQo_orwRagT7itJEP8_Hh4rXWnflYq454b'); background-size: cover;"></div>
<!-- TopAppBar (JSON Sourced) -->
<header class="bg-slate-900 dark:bg-black fixed w-full top-0 border-b border-white/10 shadow-sm flex justify-between items-center px-6 py-3 z-50">
<div class="text-lg font-black tracking-widest text-white uppercase font-inter tracking-tight">Atlas Explorer</div>
<div class="flex items-center gap-6">
<div class="text-amber-500 dark:text-amber-400 font-inter tracking-tight uppercase font-semibold">Stats: 1,250</div>
<div class="flex gap-2">
<button class="text-slate-400 hover:text-amber-300 transition-colors scale-95 active:scale-90 duration-150 flex items-center justify-center p-2 rounded-full hover:bg-white/5">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
<button class="text-slate-400 hover:text-amber-300 transition-colors scale-95 active:scale-90 duration-150 flex items-center justify-center p-2 rounded-full hover:bg-white/5">
<span class="material-symbols-outlined" data-icon="military_tech">military_tech</span>
</button>
</div>
</div>
</header>
<!-- Main Gameplay Canvas -->
<main class="flex-1 flex flex-col relative z-10 w-full max-w-container-max mx-auto px-6 py-6 mt-[60px] gap-6 h-[calc(100vh-60px)]">
<!-- HUD: Target & Timer -->
<div class="flex flex-col md:flex-row justify-between items-center gap-6 bg-surface-container/30 backdrop-blur-md p-6 rounded-xl border border-white/5 shadow-lg relative overflow-hidden">
<!-- Decorative accent line -->
<div class="absolute top-0 left-0 w-1 h-full bg-secondary-container"></div>
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-on-tertiary-container mb-2 tracking-widest opacity-80">Target Location</span>
<h1 class="font-h1-display text-h1-display text-on-primary">Locate: <span class="text-secondary-container">Texas</span></h1>
</div>
<!-- Timer Bar -->
<div class="w-full md:w-[400px] flex flex-col gap-3">
<div class="flex justify-between font-label-numeric text-label-numeric text-on-primary-container">
<span class="uppercase tracking-wider">Time Remaining</span>
<span class="text-secondary-container font-bold text-lg">14.2s</span>
</div>
<!-- Ochre fill timer -->
<div class="h-3 w-full bg-primary-container rounded-full overflow-hidden border border-white/5 shadow-inner">
<div class="h-full bg-secondary-container rounded-full relative overflow-hidden" style="width: 65%;">
<!-- Shine effect on bar -->
<div class="absolute top-0 left-0 w-full h-1/2 bg-white/20"></div>
</div>
</div>
</div>
</div>
<!-- Interactive Map Canvas -->
<div class="flex-1 relative rounded-2xl overflow-hidden border border-white/10 shadow-2xl bg-[#1a2332] flex items-center justify-center bg-dot-grid group">
<!-- Simulated Map Image (North America Focus) -->
<img alt="North America Map Canvas" class="w-full h-full object-cover opacity-60 mix-blend-luminosity scale-105 group-hover:scale-[1.02] transition-transform duration-1000 ease-out" data-alt="abstract topographical view of north america landscape rendered in dark moody slate and muted amber tones, clean digital mapping style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPnmpi0np8W9CN-TOGFUvzSutUMPMsJTD9XH8tM3D8_1ibgghKz_HtE0gxpkNPa9mmcRpn28xjsn5U9q_Kgqlmsknz4IydNJ-aoSgAVXU36s1QIhsRZL3keabbFYJeD68dNkHQKc47iWL5fsElBqgfykd8OTy6WhFERAiX5erip2CobrDTDnQIg4zU-MBd0pqtfeAqJziJgJomfUyqY1ZwnzInZ9F3sJHQs6Hki6427Gnz-eYcgm8rKlQAi9WXqVUsxaWyQ1ZGa3UL"/>
<!-- Faux SVG Region Interactions (Simulating Texas Hover State) -->
<div class="absolute inset-0 pointer-events-none flex items-center justify-center">
<!-- Reticle / Pin marker hovering over target area -->
<div class="absolute w-48 h-48 border border-secondary-container/40 rounded-full animate-[ping_3s_cubic-bezier(0,0,0.2,1)_infinite]" style="top: 55%; left: 45%; transform: translate(-50%, -50%);"></div>
<div class="absolute w-32 h-32 border-2 border-secondary-container/60 rounded-full" style="top: 55%; left: 45%; transform: translate(-50%, -50%);"></div>
<!-- Center Pin -->
<div class="absolute flex flex-col items-center" style="top: 55%; left: 45%; transform: translate(-50%, -50%);">
<div class="w-6 h-6 bg-secondary-container rounded-full shadow-[0_0_20px_rgba(254,152,0,0.6)] border-2 border-[#1a2332] flex items-center justify-center relative z-10">
<div class="w-2 h-2 bg-on-primary rounded-full"></div>
</div>
</div>
</div>
<!-- Map Controls (HUD) -->
<div class="absolute right-6 bottom-6 flex flex-col gap-2 bg-surface-container/60 backdrop-blur-md p-2 rounded-xl border border-white/10 shadow-lg">
<button class="w-12 h-12 flex items-center justify-center rounded-lg text-on-primary hover:bg-white/10 hover:text-secondary-container transition-colors">
<span class="material-symbols-outlined text-2xl">add</span>
</button>
<div class="h-px w-8 mx-auto bg-white/10"></div>
<button class="w-12 h-12 flex items-center justify-center rounded-lg text-on-primary hover:bg-white/10 hover:text-secondary-container transition-colors">
<span class="material-symbols-outlined text-2xl">remove</span>
</button>
<div class="h-px w-8 mx-auto bg-white/10"></div>
<button class="w-12 h-12 flex items-center justify-center rounded-lg text-on-primary hover:bg-white/10 hover:text-secondary-container transition-colors">
<span class="material-symbols-outlined text-2xl">my_location</span>
</button>
</div>
</div>
<!-- Clean Question/Clue Card Below Map -->
<div class="bg-surface-container/40 backdrop-blur-sm rounded-xl border border-white/10 p-6 shadow-md flex flex-col md:flex-row gap-6 items-center shrink-0">
<div class="w-14 h-14 rounded-full bg-tertiary-container border border-on-tertiary-container/30 text-on-tertiary-container flex items-center justify-center shrink-0 shadow-inner">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">explore</span>
</div>
<div class="flex-1">
<div class="flex items-center gap-3 mb-1">
<h3 class="font-h3-subheading text-h3-subheading text-on-primary">Clue 1 of 3</h3>
<span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider bg-white/10 text-on-primary-container">Region: Southwest</span>
</div>
<p class="font-body-lg text-body-lg text-on-primary-container">It is the second-largest U.S. state by both area and population, sharing a border with Mexico to the south.</p>
</div>
<button class="shrink-0 px-6 py-4 bg-primary-container hover:bg-secondary-container hover:text-on-primary border border-white/10 hover:border-secondary-container rounded-lg font-label-caps text-label-caps text-on-primary-container transition-all active:translate-y-0.5 flex items-center gap-2 group shadow-sm">
<span class="material-symbols-outlined text-lg group-hover:animate-pulse">lightbulb</span> 
                Reveal Hint <span class="opacity-50 font-normal">(-50 pts)</span>
</button>
</div>
</main>
</body></html>
